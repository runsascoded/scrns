<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>scrns video test fixture</title>
  <style>
    body { margin: 0; overflow: hidden; background: #161a2e; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')

    // Hypotrochoid: 13-cusped pattern completing in 5 rotations
    const R = 13, r = 5, d = 5
    const maxExtent = (R - r) + d
    const totalT = 10 * Math.PI
    const totalPoints = 1500

    function draw(progress) {
      // Sync canvas to current viewport (Puppeteer resizes after load)
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight

      const scale = Math.min(canvas.width, canvas.height) * 0.42
      const cx = canvas.width / 2, cy = canvas.height / 2
      const s = scale / maxExtent

      function pt(t) {
        return {
          x: cx + s * ((R - r) * Math.cos(t) + d * Math.cos((R - r) / r * t)),
          y: cy + s * ((R - r) * Math.sin(t) - d * Math.sin((R - r) / r * t)),
        }
      }

      ctx.fillStyle = '#161a2e'
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      const n = Math.max(1, Math.floor(progress * totalPoints))
      const batch = 15

      ctx.lineWidth = 2.5
      ctx.lineCap = 'round'
      ctx.lineJoin = 'round'

      for (let seg = 0; seg * batch < n; seg++) {
        const s0 = seg * batch
        const s1 = Math.min(s0 + batch, n)
        ctx.beginPath()
        ctx.strokeStyle = `hsl(${(s0 / totalPoints) * 360}, 75%, 60%)`
        for (let i = s0; i <= s1; i++) {
          const p = pt((i / totalPoints) * totalT)
          if (i === s0) ctx.moveTo(p.x, p.y)
          else ctx.lineTo(p.x, p.y)
        }
        ctx.stroke()
      }

      // Glowing tip dot
      const tip = pt((n / totalPoints) * totalT)
      ctx.save()
      ctx.shadowColor = '#fff'
      ctx.shadowBlur = 12
      ctx.beginPath()
      ctx.arc(tip.x, tip.y, 3.5, 0, Math.PI * 2)
      ctx.fillStyle = '#fff'
      ctx.fill()
      ctx.restore()
    }

    // Auto-animate for real-time capture (8s to draw full pattern)
    // Starts when scrns signals capture is beginning
    let autoAnimate = true
    let animationStart = null
    document.addEventListener('scrns:capture-start', () => {
      if (animationStart === null) animationStart = Date.now()
    })
    setInterval(() => {
      if (!autoAnimate || animationStart === null) return
      draw(Math.min((Date.now() - animationStart) / 8000, 1))
    }, 16)

    // Deterministic frame-by-frame (disables auto-animation)
    window.setFrame = (i, n) => {
      autoAnimate = false
      draw((i + 1) / n)
    }
  </script>
</body>
</html>
