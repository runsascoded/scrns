<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>scrns screencast test fixture</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: red;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #status {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="status">red</div>
  <script>
    const colors = ['red', 'green', 'blue']
    let idx = 0
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ') {
        idx = (idx + 1) % colors.length
        document.body.style.background = colors[idx]
        document.getElementById('status').textContent = colors[idx]
      }
    })
    // For deterministic animate actions
    window.setColorIndex = (i) => {
      const c = colors[i % colors.length]
      document.body.style.background = c
      document.getElementById('status').textContent = c
    }
  </script>
</body>
</html>
