include:
  - project: 'runsascoded/js/pnpm-dist'
    file: '/dist.gitlab-ci.yml'

image: node:22
stages:
  - test
  - deploy

.pnpm_setup:
  before_script:
    - npm install -g pnpm@9
    - pnpm install

# Run tests on all branches
test:
  stage: test
  extends: .pnpm_setup
  script:
    - pnpm test

# NPM publishing (on version tags)
deploy_npm:
  stage: deploy
  extends: .pnpm_setup
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - pnpm test
    - pnpm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
    - npm publish --access public

# Dist branch (manual trigger or version tags)
# Inherited from pnpm-dist via include
