include:
  - project: 'runsascoded/js/pnpm-dist'
    file: '/dist.gitlab-ci.yml'

image: node:22
stages:
  - test
  - deploy

.pnpm_setup:
  before_script:
    - npm install -g pnpm@9
    - pnpm install

.chrome_deps:
  before_script:
    # Install Chrome dependencies for Puppeteer
    - apt-get update && apt-get install -y
        libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2
        libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        libgbm1 libasound2
    - npm install -g pnpm@9
    - pnpm install

# Run tests on all branches
test:
  stage: test
  extends: .chrome_deps
  script:
    - pnpm test

# NPM publishing (on version tags)
deploy_npm:
  stage: deploy
  extends: .chrome_deps
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - pnpm test
    - pnpm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
    - npm publish --access public

# Dist branch (manual trigger or version tags)
# Inherited from pnpm-dist via include
