image: node:latest
stages:
  - deploy
deploy_npm:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest-9 --activate
  script:
    - pnpm install
    - pnpm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
    - npm publish --access public
