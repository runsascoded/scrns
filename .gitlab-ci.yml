include:
  - project: 'runsascoded/js/gl-pnpm-dist'
    file: '/dist.gitlab-ci.yml'

image: node:latest
stages:
  - deploy

# NPM publishing (on version tags)
deploy_npm:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest-9 --activate
  script:
    - pnpm install
    - pnpm run build
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
    - npm publish --access public

# Dist branch (manual trigger or version tags)
# Inherited from gl-pnpm-dist via include
